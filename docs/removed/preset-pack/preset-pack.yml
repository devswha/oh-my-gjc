# omg preset-pack v2 — 최종 프리셋 2개: daily(대화) + agent(무인) (canonical source)
#
# `/omg:preset-pack install`이 이 `profiles:` 하위 블록을 사용자의
# ~/.gjc/agent/models.yml `profiles:` 아래로 "이름 단위"로 병합한다
# (같은 이름이면 교체, 없으면 추가). 그 외 프로파일·최상위 키는 절대 건드리지 않는다.
# 설치 스크립트는 이 파일을 자동 병합하지 않는다 — 명시적 커맨드 호출만이 병합 경로다.
#
# 2-프리셋 확정 (2026-07-20 하코): 사람 세션 = daily, 무인 에이전트 세션 = agent.
#   - v1의 deep(=daily effort 변형, 실사용 0)·sec(클램프 복구 전용)는 폐지 —
#     fable 클램프로 세션이 죽으면 `gjc -r <세션ID> --mpreset agent`로 복구한다
#     (agent 주력 sol은 클램프 무풍이라 sec의 유일 용도를 그대로 대체).
#   - `/omg:preset-pack install`은 폐지된 deep/sec가 "과거 이 팩이 병합한 그대로"
#     남아 있으면 백업 후 함께 제거한다(사용자가 수정한 사본은 건드리지 않는다).
#
# 좌석표 원리 (2026-07-19 확정, 2026-07-20 agent 추가):
#   - daily: 대화 반응성·품질 균형. fable 주력은 보안 주제에서 클램프로 세션이
#     죽을 수 있다 → 그런 세션은 agent로 resume.
#   - agent: 무인 자율 러닝 계약 — 주력을 Codex 창(sol)으로 고정해 사람 세션의
#     Claude 창과 쿼터 분리, 클램프 무풍, effort는 루프에 곱해질수록 낮게.
#     제작(OpenAI) ↔ 심사(Anthropic) 완전 분리. 빌트인 opus-codex(주력
#     opus:xhigh·executor terra:low — 대화형 설계)와는 정반대 방향이라 대체 불가.
#   - 좌석 근거: sol 주력=gjc-pr 세션 단독 주력 실사용, sol:high planner=ralplan
#     벤치 완주(구 k3 planner 폴백으로 문서화했던 좌석), terra:xhigh=gpt-5.6 벤치
#     상한, opus medium(architect: 루프 자리)·high(critic: 미탐 비용) = daily와 동일 원리.
#
# 셀렉터는 카탈로그·시점 민감(2026-07-20 실호출 검증 예정: daily/agent 활성 + Reply OK).
# 재검증: GJC_NOTIFICATIONS=0 GJC_SDK_DISABLE=1 gjc --mpreset <p> -p --no-session --no-tools "Reply OK"

profiles:

  daily:      # 사람 세션 상주 기본
    display_name: daily
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   anthropic/claude-fable-5:medium
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:medium
      critic:    anthropic/claude-opus-4-8:high

  agent:      # 무인 자율 세션 — 대화 없음, 장기 러닝, 위임 위주 (클램프 복구 resume 겸용)
    display_name: agent
    required_providers: [anthropic, openai-codex]
    model_mapping:
      default:   openai-codex/gpt-5.6-sol:medium
      planner:   openai-codex/gpt-5.6-sol:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:medium
      critic:    anthropic/claude-opus-4-8:high

# 폐지 기록 (v2, 2026-07-20 하코 확정):
#   deep — daily의 effort 변형(default·architect만 high). 위임 좌석이 daily와 동일해
#          실효 미미, 실사용 0. 필요하면 세션에서 /model로 일시 조정이 낫다.
#   sec  — fable 클램프 복구 전용(주력 k3). agent가 복구 경로를 대체.
#   과거 병합본 정리는 /omg:preset-pack install|remove의 명시 경로만 수행한다.

# v1 폐지 프로파일 원본 fixture — 병합 대상이 아니다(install은 `profiles:`의 daily/agent만
# 병합). 용도는 단 하나: 사용자 profiles의 deep/sec가 "v1 팩이 병합한 그대로"인지
# 파스 동등성(YAML 파싱 결과 동일)으로 정확 비교해, 일치할 때만 백업 후 정리한다.
# 한 좌석이라도 다르면 사용자 수정본이므로 무접촉.
retired_v1_profiles:
  deep:
    display_name: deep
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   anthropic/claude-fable-5:high
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:high
      critic:    anthropic/claude-opus-4-8:high
  sec:
    display_name: sec
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   kimi-code/k3:high
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:high
      critic:    anthropic/claude-opus-4-8:high