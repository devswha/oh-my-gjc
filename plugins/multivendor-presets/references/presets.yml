# multivendor-presets — 멀티벤더 모델 프로파일 프리셋 (canonical source)
#
# 이 파일의 `profiles:` 하위 블록을 사용자의 ~/.gjc/agent/models.yml `profiles:`
# 아래로 "이름 단위"로 병합한다(같은 이름이면 교체, 없으면 추가). 그 외의
# 프로파일이나 최상위 키(default 등)는 절대 건드리지 않는다.
#
# 활성화:
#   gjc --mpreset ultimate                 # 이번 세션만
#   gjc --mpreset ultimate --default       # config.yml에 시작 기본값으로 고정
#   gjc --mpreset ultimate-f5
#
# 요구 로그인(4벤더): /login anthropic, /login openai-codex,
#   /login google-antigravity, /login xai
# required_providers 중 하나라도 자격증명이 없으면 활성화가 하드블록된다.
#
# ⚠ 셀렉터/가격/축 리더는 카탈로그·시점 민감(2026-06~07 기준). 실호출 검증:
#   gjc -p --no-session --no-tools --model <selector> "Reply OK"

profiles:

  ultimate:                            # 비용무시, 역할별 최강 + 벤더분산
    required_providers: [anthropic, openai-codex, google-antigravity, xai]
    model_mapping:
      default:   anthropic/claude-opus-4-8:high
      executor:  anthropic/claude-opus-4-8:max                  # 구독 포함 코딩 최강(SWE-bench 88.6)
      planner:   openai-codex/gpt-5.5:xhigh                     # 최상위 추론 + OpenAI 다양성
      architect: google-antigravity/gemini-3.1-pro-low:high     # 1M ctx·멀티모달
      critic:    xai/grok-4.3:high                              # cross-family 독립비평

  ultimate-f5:                         # = escalation 리네임. 고실패비용 — 실패 신호 시 Fable 5 구원투수 + cross-family critic
    required_providers: [anthropic, openai-codex, google-antigravity, xai]
    model_mapping:
      default:   anthropic/claude-opus-4-8:high                 # 라우터는 Opus 유지(품질 상한·안정)
      executor:  anthropic/claude-fable-5:xhigh                 # 구원투수(SWE-V 95.0), 간헐 사용. ⚠:max 금지(xhigh 침묵 클램프)
      planner:   openai-codex/gpt-5.5:xhigh
      architect: google-antigravity/gemini-3.1-pro-low:high     # 1M ctx·멀티모달
      critic:    xai/grok-4.3:high                              # cross-family 독립비평 — Fable 자기평가 금지
