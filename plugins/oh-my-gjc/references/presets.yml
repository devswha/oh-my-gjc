# multivendor-presets v0.2 — 멀티벤더 모델 프로파일 프리셋 (canonical source)
#
# 이 파일의 `profiles:` 하위 블록을 사용자의 ~/.gjc/agent/models.yml `profiles:`
# 아래로 "이름 단위"로 병합한다(같은 이름이면 교체, 없으면 추가). 그 외의
# 프로파일이나 최상위 키(default 등)는 절대 건드리지 않는다.
#
# v0.2 (2026-07): 구 ultimate/ultimate-f5를 폐기하고 증거 리서치 기반 3종으로 교체.
#   - ultimate    → ideal에 흡수 (gemini architect가 툴체인 신뢰성 실측으로 탈락,
#                   이후 교차비평으로 architect는 gpt-5.5로 확정 — 코드 레인 완전교차)
#   - ultimate-f5 → 2026-07-07 만료 이벤트 프리셋이었음. 구원투수 역할은
#                   escalate-surgical이 승계.
#
# 활성화:
#   gjc --mpreset ideal                    # 이번 세션만
#   gjc --mpreset ideal --default          # config.yml에 시작 기본값으로 고정
#   gjc --mpreset escalate-surgical        # 난제 그 문제 하나만, 끝나면 복귀
#   gjc --mpreset monorepo                 # 거대 코드베이스 전용
#
# 요구 로그인: ideal = anthropic·openai-codex·xai(API키 가능),
#   escalate-surgical + google-antigravity(부계정 권장 — 비공식 ToS 리스크),
#   monorepo = anthropic·google-antigravity·opencode-go(OPENCODE_API_KEY).
# required_providers 중 하나라도 자격증명이 없으면 활성화가 하드블록된다.
#
# ⚠ 셀렉터/벤치 근거는 카탈로그·시점 민감(2026-07-03 리서치 기준). 실호출 검증:
#   GJC_NOTIFICATIONS=0 gjc -p --no-session --no-tools --model <selector> "Reply OK"

profiles:

  # ── ideal: 평시 기본. architect 배제 이력: gemini(툴체인 붕괴 — "6회 이상 연속 툴콜 정확도
  #   붕괴"·"하네스 탈출", 여론 일관) → opus(v1) → gpt-5.5(v2, 교차비평 반영): opus architect는
  #   opus executor 코드의 자기채점이라 코드 레인 교차가 우선. 플랜 레인(gpt plan→gpt review)의
  #   부분 자기채점은 critic(grok) 게이트로 감수 — 3벤더 5좌석에선 양 레인 동시 완전교차 불가.
  #   ⚠architect ctx 272K — 초대형 리뷰는 monorepo(opus architect 1M)로.
  #   Opus 근거: SWE-bench Pro 69.2 1위, METR 12h 완주 50% 1위, 자기결함 플래깅 4배(Bridgewater).
  #   ⚠Opus 프롬프트 인젝션 상대 취약 — 웹 헤비 세션 주의.
  ideal:
    display_name: ideal-v2
    required_providers: [anthropic, openai-codex, xai]
    model_mapping:
      default:   anthropic/claude-opus-4-8:xhigh                # 장기 코히런스·정직성 1위. xhigh = Anthropic 권장 에이전틱 버킷
      executor:  anthropic/claude-opus-4-8:max                  # SWE Pro 69.2, 非Fable 최강. executor엔 위임급 작업만 도착 + adaptive thinking이라 :max 순이득. Fable 불가 시 폴백 겸용
      planner:   openai-codex/gpt-5.5:xhigh                     # reasoning 100/100·agentic 99.2, cross-family 견제
      architect: openai-codex/gpt-5.5:xhigh                     # 저자(opus)와 다른 벤더가 코드 아키리뷰 — 자기채점 제거
      critic:    xai/grok-4.3:high                              # 3벤더째 독립 판정, structured output (xai :xhigh→:high 침묵 클램프)

  # ── 구원투수: 상시 아님. "막힌 그 문제 하나"만 던지고 ideal로 회귀.
  #   설계·판단 교착이면 planner만 fable-5:xhigh로 수동 스왑.
  #   ⚠Fable 불가 시(수출통제 재발 전과 / 크레딧 소진 / refusal) → ideal로 회귀 (executor opus:max가 폴백)
  escalate-surgical:                   # 외과적 최적화·탐색량 큰 난제 디버깅 — Fable5 executor
    required_providers: [anthropic, openai-codex, google-antigravity, xai]
    model_mapping:
      default:   anthropic/claude-opus-4-8:high
      executor:  anthropic/claude-fable-5:xhigh                 # SWE-V 95.0. ⚠:max 금지(xhigh 침묵 클램프). refusal(HTTP 200+stop_reason) 유의
      planner:   openai-codex/gpt-5.5:xhigh
      architect: google-antigravity/gemini-3.1-pro-low:high     # 1M ctx·멀티모달
      critic:    xai/grok-4.3:high                              # cross-family — Fable 자기평가 금지

  monorepo:                            # 거대 코드베이스 — 전 역할 ≥1M ctx (gpt-5.5 272K 배제)
    required_providers: [anthropic, google-antigravity, opencode-go]
    model_mapping:
      default:   anthropic/claude-opus-4-8:medium               # 1M
      executor:  anthropic/claude-opus-4-8:high                 # 1M
      planner:   google-antigravity/gemini-3.1-pro-low:high     # 1M
      architect: anthropic/claude-opus-4-8:high                 # 1M 멀티턴 누적·실효검색 최상
      critic:    opencode-go/glm-5.2                            # 1M. ⚠증류-상관성(GLM=Claude 증류 → 실패 표면 공유) — ctx 감수 가능하면 gpt-5.4:high 우선
