# multivendor-presets v0.10 — 모델 프로파일 프리셋 (canonical source)
#
# 이 파일의 `profiles:` 하위 블록을 사용자의 ~/.gjc/agent/models.yml `profiles:`
# 아래로 "이름 단위"로 병합한다(같은 이름이면 교체, 없으면 추가). 그 외의
# 프로파일이나 최상위 키(default 등)는 절대 건드리지 않는다.
#
# v0.10 (2026-07-14): 커스텀 정본을 `sol` 단일로 축소 — 하코 직접 지시.
#   - gjc 빌트인이 나머지 용도를 전부 커버하므로 커스텀 사본을 유지할 이유가 없다
#     (로컬 사본은 상류 갱신을 못 따라가 썩는다 — 구 daily 사례).
#     품질 랄플랜 = 빌트인 `opus-codex` · 단일 로그인 = 빌트인 `codex-medium`/`codex-pro`
#     · 안전-크리티컬 = 빌트인 `fable-opus-codex`. 전부 gjc 0.10.2 실활성 검증(2026-07-14).
#   - `grok`/`codex`/`fable-codex`는 은퇴(닫힌 목록 등재). grok-build 의존도 함께 사라짐.
#   - `sol`만 빌트인에 없는 구성이라 커스텀 유지: 저지연 본체 + 교차패밀리 중간 기획
#     좌석 + 벤치 근거 executor. 실전 ralplan ≥2× 단축 실측
#     (docs/verification/sol-v09-ralplan-bench-2026-07-14.md).
# v0.9 (2026-07-14): `sol`을 전 구간 저지연으로 정합화 — 실사용 데이터 반영.
#   - planner sol:xhigh→high, architect opus:high→medium, critic opus:xhigh→high.
#     executor는 terra:xhigh 유지(벤치 근거 + ralplan 루프 밖).
#   - 실호출 검증 2026-07-14: opus-4-8:medium·sol:high OK.
# v0.8 이전 연혁은 git 히스토리 참조 (fable-codex 신설, codex 신설, grok/sol 개명 등).
#
# 활성화:
#   gjc --mpreset sol                      # 이번 세션만
#   gjc --mpreset sol --default            # config.yml에 시작 기본값으로 고정 (권장)
#   gjc --mpreset opus-codex               # 품질 랄플랜 (gjc 빌트인)
#   gjc --mpreset codex-pro                # openai-codex 단일 로그인 비상 (gjc 빌트인)
#   gjc --mpreset fable-opus-codex         # 안전-크리티컬 (gjc 빌트인)
#
# 요구 로그인: sol = openai-codex·anthropic.
# required_providers 중 하나라도 자격증명이 없으면 활성화가 하드블록된다.
#
# ⚠ 셀렉터/벤치 근거는 카탈로그·시점 민감(2026-07 리서치 기준). 실호출 검증:
#   GJC_NOTIFICATIONS=0 gjc -p --no-session --no-tools --model <selector> "Reply OK"

profiles:

  # ── sol: 유일한 커스텀 프리셋 — 전 구간 저지연 codex+opus.
  #   일반 질의·작은 수정 + 빠른 ralplan/interview 용. ralplan 합의 루프(planner/
  #   architect/critic 반복 호출) 과지연 실측으로 기획 좌석을 중간 effort로 유지한다.
  #   executor는 벤치 근거 terra:xhigh(gajae-code docs/gpt-5.6-codex-preset-benchmark.md).
  #   실호출 검증 2026-07-14: sol:low·sol:high·opus-4-8:medium·opus-4-8:high OK.
  sol:
    display_name: sol
    required_providers: [openai-codex, anthropic]
    model_mapping:
      default:   openai-codex/gpt-5.6-sol:low
      executor:  openai-codex/gpt-5.6-terra:xhigh               # 벤치 근거
      architect: anthropic/claude-opus-4-8:medium
      planner:   openai-codex/gpt-5.6-sol:high
      critic:    anthropic/claude-opus-4-8:high
