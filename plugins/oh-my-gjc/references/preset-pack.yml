# omg preset-pack v1 — 최종 좌석표 1개 + effort 변형 3개 (canonical source)
#
# `/omg:preset-pack install`이 이 `profiles:` 하위 블록을 사용자의
# ~/.gjc/agent/models.yml `profiles:` 아래로 "이름 단위"로 병합한다
# (같은 이름이면 교체, 없으면 추가). 그 외 프로파일·최상위 키는 절대 건드리지 않는다.
# 설치 스크립트는 이 파일을 자동 병합하지 않는다 — 명시적 커맨드 호출만이 병합 경로다.
#
# 좌석표 원리 (2026-07-19 확정):
#   - 구도: 제작(OpenAI terra / Moonshot k3) ↔ 심사(Anthropic opus) 완전 분리.
#   - effort: 루프에 곱해질수록 낮게(default·architect), 미탐 비용에 비례(critic),
#     루프 밖은 상한(executor terra:xhigh — gajae-code gpt-5.6 벤치 근거).
#   - fable = anthropic/claude-fable-5: 적대적 감사 기질 지휘자. 보안 주제(익스플로잇,
#     pentest, CVE 재현 등)에서 클램프로 세션이 죽을 수 있다 → 그런 날은 sec.
#   - k3 = kimi-code/k3 (선언 1M, gjc thinking 상한 high). :medium은 서버에서 high로
#     승격되므로 low/high만 쓴다. K3 planner는 ralplan 계약(receipt-only) 검증 대기.
#   - ⚠ K3 실효 컨텍스트 실측(2026-07-19): 선언은 1M이나 kimi-code 게이트웨이가
#     요청 총 페이로드 2MiB 캡을 물린다(단발·멀티턴 누적 모두 400 재현). 실효
#     ≈ 400~600k 토큰 — codex 272k보다는 크므로 planner 우위는 유지, "1M" 아님.
#     ~350k 토큰 단발은 양끝 니들 완벽 회수 확인.
#
# 셀렉터는 카탈로그·시점 민감(2026-07-19 실호출 검증: daily/deep/sec 활성 + Reply OK).
# 재검증: GJC_NOTIFICATIONS=0 GJC_SDK_DISABLE=1 gjc --mpreset <p> -p --no-session --no-tools "Reply OK"

profiles:

  daily:      # 상주 기본
    display_name: daily
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   anthropic/claude-fable-5:medium
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:medium
      critic:    anthropic/claude-opus-4-8:high

  deep:       # 토론 · --deliberate 고위험 — 같은 좌석표, effort만 상향
    display_name: deep
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   anthropic/claude-fable-5:high
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:high
      critic:    anthropic/claude-opus-4-8:high

  sec:        # 보안 작업 — fable 클램프로 세션 터질 냄새 나는 날 (터졌으면 이걸로 resume)
    display_name: sec
    required_providers: [anthropic, openai-codex, kimi-code]
    model_mapping:
      default:   kimi-code/k3:high
      planner:   kimi-code/k3:high
      executor:  openai-codex/gpt-5.6-terra:xhigh
      architect: anthropic/claude-opus-4-8:high
      critic:    anthropic/claude-opus-4-8:high
